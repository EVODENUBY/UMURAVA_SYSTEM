name: CI

on:
  push:
    branches: [main, evode-backend, bahat-backend, steven-frontend, adolphe-frontend]
  pull_request:
    branches: [main, evode-backend, bahat-backend, steven-frontend, adolphe-frontend]

jobs:
  frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend
      
      - name: Lint
        run: npm run lint
        working-directory: ./frontend
      
      - name: Build
        run: npm run build
        working-directory: ./frontend

  backend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./backend
      
      - name: Lint
        run: npm run lint
        working-directory: ./backend
      
      - name: Build
        run: npm run build
        working-directory: ./backend